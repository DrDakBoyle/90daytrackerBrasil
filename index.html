    .ld-sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }

    .ld-sync-dot.error { background: #f87171; }
    .ld-sync-dot.offline { background: #71717a; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .ld-divider { height: 0.5px; background: #2a2a2a; margin: 8px 0 18px; }
    .ld-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    @media (max-width: 600px) { .ld-stats { grid-template-columns: repeat(2, 1fr); } }
    .ld-stat { background: #111; border: 0.5px solid #1f1f1f; border-radius: 10px; padding: 14px; text-align: center; }
    .ld-stat-val { font-size: 22px; font-weight: 500; }
    .ld-stat-lbl { font-size: 10px; color: #71717a; letter-spacing: 1px; margin-top: 6px; }
    .ld-bars { margin-bottom: 14px; }
    .ld-bar-row { display: grid; grid-template-columns: 70px 1fr 40px; gap: 10px; align-items: center; margin-bottom: 6px; font-size: 12px; }
    .ld-bar-track { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .ld-bar-fill { height: 100%; transition: width 0.3s; }
    .ld-bar-pct { font-size: 11px; color: #71717a; text-align: right; }
    .ld-msg { background: rgba(74, 222, 128, 0.08); border: 0.5px solid rgba(74, 222, 128, 0.25); color: #4ade80; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; margin-bottom: 18px; }
    .ld-tabs { display: flex; gap: 4px; border-bottom: 0.5px solid #2a2a2a; margin-bottom: 16px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
    .ld-tab { background: transparent; border: none; color: #71717a; padding: 10px 12px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; font-family: inherit; }
    .ld-tab.active { color: #e5e5e5; border-bottom-color: #4ade80; }
    .ld-section-title { font-size: 10px; color: #71717a; letter-spacing: 1.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .ld-section-title .ld-edit-btn { background: transparent; border: 0.5px solid #2a2a2a; color: #71717a; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; letter-spacing: 0.5px; font-family: inherit; }
    .ld-section-title .ld-edit-btn:hover { color: #4ade80; border-color: #4ade80; }
    .ld-task { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
    .ld-task:hover { background: #131313; }
    .ld-task.done { opacity: 0.5; }
    .ld-task.done .ld-task-title { text-decoration: line-through; }
    .ld-task.editing { cursor: default; background: #131313; }
    .ld-checkbox { width: 18px; height: 18px; border: 1.5px solid #3a3a3a; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #0a0a0a; font-size: 12px; }
    .ld-task.done .ld-checkbox { background: #4ade80; border-color: #4ade80; }
    .ld-task-body { flex: 1; min-width: 0; }
    .ld-task-title { font-size: 14px; color: #e5e5e5; }
    .ld-task-sub { font-size: 11px; color: #71717a; margin-top: 2px; }
    .ld-task-xp { font-size: 11px; color: #71717a; background: #1a1a1a; padding: 4px 8px; border-radius: 10px; }
    .ld-edit-input { background: #0a0a0a; border: 0.5px solid #4ade80; color: #e5e5e5; padding: 4px 8px; border-radius: 4px; width: 100%; font-family: inherit; font-size: 13px; box-sizing: border-box; }
    .ld-edit-input.sub { font-size: 11px; color: #a1a1aa; margin-top: 4px; }
    .ld-icon-btn { background: transparent; border: none; color: #71717a; cursor: pointer; padding: 4px; font-size: 14px; }
    .ld-icon-btn:hover { color: #4ade80; }
    .ld-icon-btn.danger:hover { color: #f87171; }
    .ld-add-row { display: flex; gap: 6px; margin-top: 8px; padding: 10px; background: #0a0a0a; border: 0.5px dashed #2a2a2a; border-radius: 8px; flex-wrap: wrap; }
    .ld-add-row input { flex: 1; min-width: 100px; background: #0f0f0f; border: 0.5px solid #1a1a1a; color: #e5e5e5; padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 12px; }

    .ld-notes { width: 100%; min-height: 180px; background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 8px; padding: 14px; color: #e5e5e5; font-family: inherit; font-size: 13px; resize: vertical; line-height: 1.7; box-sizing: border-box; }

    .ld-budget { background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .ld-budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
    .ld-budget-input { background: #0a0a0a; border: 0.5px solid #2a2a2a; color: #e5e5e5; padding: 6px 10px; border-radius: 6px; width: 80px; font-family: inherit; font-size: 13px; }
    .ld-food-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 6px; }
    .ld-food { padding: 8px 10px; background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 6px; font-size: 12px; cursor: pointer; text-align: center; color: #a1a1aa; }
    .ld-food.had { background: rgba(74, 222, 128, 0.1); border-color: rgba(74, 222, 128, 0.3); color: #4ade80; }
    .ld-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 12px; margin-bottom: 18px; }
    .ld-day { background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 8px; padding: 14px 4px; text-align: center; min-height: 70px; display: flex; flex-direction: column; justify-content: center; }
    .ld-day.today { border-color: #4ade80; }
    .ld-day-letter { font-size: 12px; color: #71717a; margin-bottom: 6px; }
    .ld-day-dot { font-size: 10px; }
    .ld-heatmap { display: grid; grid-template-columns: repeat(13, 1fr); grid-template-rows: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
    .ld-heat-cell { aspect-ratio: 1; background: #111; border-radius: 4px; }
    .ld-heat-cell.l1 { background: rgba(74, 222, 128, 0.15); }
    .ld-heat-cell.l2 { background: rgba(74, 222, 128, 0.35); }
    .ld-heat-cell.l3 { background: rgba(74, 222, 128, 0.6); }
    .ld-heat-cell.l4 { background: rgba(74, 222, 128, 0.9); }
    .ld-heat-labels { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 8px; }
    .ld-heat-label { font-size: 9px; color: #52525b; text-align: center; }
    .ld-lang-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .ld-lang-btn, .ld-skill-btn { background: #0f0f0f; border: 0.5px solid #1a1a1a; color: #a1a1aa; padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; flex: 1; }
    .ld-lang-btn.active, .ld-skill-btn.active { background: rgba(74, 222, 128, 0.1); border-color: #4ade80; color: #4ade80; }
    .ld-btn { background: transparent; border: 0.5px solid #2a2a2a; color: #a1a1aa; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .ld-btn:hover { border-color: #4ade80; color: #4ade80; }
    .ld-btn.danger:hover { border-color: #f87171; color: #f87171; }
    .ld-section { display: none; }
    .ld-section.active { display: block; }
    .ld-ladder { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .ld-rung { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .ld-rung:hover { background: #131313; }
    .ld-rung.current { background: rgba(74, 222, 128, 0.08); border-color: #4ade80; color: #4ade80; }
    .ld-rung.completed { color: #71717a; }
    .ld-rung.completed .ld-rung-num { color: #4ade80; }
    .ld-rung-num { font-size: 11px; color: #71717a; background: #1a1a1a; padding: 2px 6px; border-radius: 4px; min-width: 24px; text-align: center; }
    .ld-rung-name { flex: 1; }
    .ld-rung-target { font-size: 11px; color: #71717a; }
    .ld-log-row { display: grid; grid-template-columns: 80px 1fr 60px 30px; gap: 8px; align-items: center; padding: 10px; background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
    .ld-log-row .ld-log-date { color: #71717a; font-size: 11px; }
    .ld-log-row .ld-log-notes { color: #a1a1aa; }
    .ld-log-empty { font-size: 12px; color: #52525b; text-align: center; padding: 20px; }
    .ld-session-form { background: #0f0f0f; border: 0.5px solid #1a1a1a; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .ld-form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
    .ld-form-row label { font-size: 12px; color: #a1a1aa; min-width: 80px; }
    .ld-form-row input, .ld-form-row textarea { background: #0a0a0a; border: 0.5px solid #2a2a2a; color: #e5e5e5; padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 12px; flex: 1; min-width: 100px; box-sizing: border-box; }
    .ld-form-row textarea { min-height: 50px; resize: vertical; }
    .ld-auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; max-width: 360px; margin: 0 auto; }
    .ld-auth-title { font-size: 24px; margin-bottom: 8px; }
    .ld-auth-sub { font-size: 13px; color: #71717a; margin-bottom: 32px; text-align: center; }
    .ld-auth-form { width: 100%; }
    .ld-auth-input { width: 100%; background: #0f0f0f; border: 0.5px solid #2a2a2a; color: #e5e5e5; padding: 12px 14px; border-radius: 8px; margin-bottom: 10px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
    .ld-auth-input:focus { outline: none; border-color: #4ade80; }
    .ld-auth-btn { width: 100%; background: #4ade80; color: #0a0a0a; border: none; padding: 12px; border-radius: 8px; font-weight: 500; cursor: pointer; font-family: inherit; font-size: 14px; margin-top: 8px; }
    .ld-auth-btn:hover { background: #22c55e; }
    .ld-auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ld-auth-toggle { background: transparent; border: none; color: #71717a; cursor: pointer; font-size: 12px; margin-top: 16px; font-family: inherit; text-decoration: underline; }
    .ld-auth-error { color: #f87171; font-size: 12px; margin-top: 10px; text-align: center; }
    .ld-loading { text-align: center; padding: 40px; color: #71717a; font-size: 13px; }
    .ld-user-info { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #71717a; flex-wrap: wrap; }
  </style>
</head>

    // ================================

    const DEFAULTS = {

          name: 'Front lever',

            { id: 'fl2', name: 'Advanced tuck hold', target: '3 × 15s' },
            { id: 'fl3', name: 'Single-leg front lever', target: '3 × 10s each side' },

          ],

        },
        muscle_up: {
          name: 'Muscle-up',

            { id: 'mu1', name: 'Strict pull-ups', target: '3 × 8' },
            { id: 'mu2', name: 'Chest-to-bar pull-ups', target: '3 × 5' },
            { id: 'mu3', name: 'Straight bar dips', target: '3 × 8' },
            { id: 'mu4', name: 'Explosive high pull-up + transition drill', target: '3 × 5' },
            { id: 'mu5', name: 'Banded muscle-up', target: '3 × 3' },
            { id: 'mu6', name: 'First strict muscle-up', target: '1 rep' },
            { id: 'mu7', name: 'Strict muscle-up', target: '3 × 3' },
          ],
          currentRung: 0,
        },
      },
    };

    function freshState(){
      return {
        day: 1, totalXP: 0, streak: 0,
        completed: {}, foods: {}, teas: {},
        grocery: 0, saunaMin: 0, saunaRounds: 0,
        mood: 0, notes: '', langVocab: '',
        activeLang: 'es', activeSkill: 'front_lever',
        history: {},
        tasks: JSON.parse(JSON.stringify(DEFAULTS.tasks)),
        foodList: [...DEFAULTS.foods],
        teaList: [...DEFAULTS.teas],
        skills: JSON.parse(JSON.stringify(DEFAULTS.skills)),
        skillLog: [],
      };
    }

    let state = freshState();
    let user = null;
    let syncStatus = 'idle';
    let saveTimer = null;
    let editMode = { group: null, foods: false, skills: false };

    function escapeHtml(str){
      if (str == null) return '';
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

    async function loadFromCloud(){
      if (!user) return;
      setSync('syncing');
      try {
        const { data, error } = await supabase
          .from('lockdown_state')
          .select('state')
          .eq('user_id', user.id)
          .maybeSingle();
        if (error) throw error;
        if (data && data.state) {
          state = Object.assign(freshState(), data.state);
        }
        try { localStorage.setItem('ld-state-cache', JSON.stringify(state)); } catch(_){}
        setSync('synced');
      } catch(e) {
        console.error('Load error', e);
        try {
          const cache = localStorage.getItem('ld-state-cache');
          if (cache) state = Object.assign(freshState(), JSON.parse(cache));
        } catch(_){}
        setSync('error');
      }
      renderApp();
    }

    async function saveToCloud(){
      if (!user) return;
      setSync('syncing');
      try { localStorage.setItem('ld-state-cache', JSON.stringify(state)); } catch(_){}
      try {
        const { error } = await supabase
          .from('lockdown_state')
          .upsert({ user_id: user.id, state, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
        if (error) throw error;
        setSync('synced');
      } catch(e) {
        console.error('Save error', e);
        setSync('error');
      }
    }

    function save(){
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(saveToCloud, 800);
    }

    function setSync(status){
      syncStatus = status;
      const el = document.getElementById('ld-sync');
      if (!el) return;
      const dot = el.querySelector('.ld-sync-dot');
      const text = el.querySelector('.ld-sync-text');
      dot.className = 'ld-sync-dot ' + (status === 'syncing' ? 'syncing' : status === 'error' ? 'error' : status === 'offline' ? 'offline' : '');
      text.textContent = status === 'syncing' ? 'syncing…' : status === 'error' ? 'sync error' : status === 'offline' ? 'offline' : 'synced';
    }

    function renderAuth(mode = 'signin', errorMsg = ''){
      const root = document.getElementById('ld-root');
      root.innerHTML = `<div class="ld-shell">
        <div class="ld-auth-screen">
          <h1 class="ld-auth-title">90-Day <span style="color:#4ade80">Lockdown</span></h1>
          <div class="ld-auth-sub">${mode === 'signin' ? 'Sign in to sync across devices' : 'Create account to start tracking'}</div>
          <div class="ld-auth-form">
            <input type="email" class="ld-auth-input" id="auth-email" placeholder="Email" autocomplete="email" />
            <input type="password" class="ld-auth-input" id="auth-pass" placeholder="Password (8+ characters)" autocomplete="${mode === 'signin' ? 'current-password' : 'new-password'}" />
            <button class="ld-auth-btn" id="auth-submit">${mode === 'signin' ? 'Sign in' : 'Create account'}</button>
            ${errorMsg ? `<div class="ld-auth-error">${escapeHtml(errorMsg)}</div>` : ''}
            <button class="ld-auth-toggle" id="auth-toggle">
              ${mode === 'signin' ? 'Need an account? Sign up' : 'Have an account? Sign in'}
            </button>
          </div>
        </div>
      </div>`;
      document.getElementById('auth-toggle').addEventListener('click', () => {
        renderAuth(mode === 'signin' ? 'signup' : 'signin');
      });
      const submit = async () => {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-pass').value;
        if (!email || password.length < 8) {
          renderAuth(mode, 'Need email and password 8+ characters');
          return;
        }
        const btn = document.getElementById('auth-submit');
        btn.textContent = '…';
        btn.disabled = true;
        try {
          const fn = mode === 'signin' ? supabase.auth.signInWithPassword : supabase.auth.signUp;
          const { data, error } = await fn.call(supabase.auth, { email, password });
          if (error) throw error;
          if (data.user) {
            user = data.user;
            await loadFromCloud();
          }
        } catch(e) {
          renderAuth(mode, e.message || 'Auth failed');
        }
      };
      document.getElementById('auth-submit').addEventListener('click', submit);
      ['auth-email','auth-pass'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') submit();
        });
      });
    }

    async function signOut(){
      await supabase.auth.signOut();
      user = null;
      state = freshState();
      renderAuth('signin');
    }

    function pctDone(group){
      const key = group === 'lang' ? (state.activeLang === 'es' ? 'lang_es' : 'lang_pt') : group;
      const list = state.tasks[key];
      if (!list || !list.length) return 0;
      const done = list.filter(t => state.completed[t.id]).length;
      return Math.round((done / list.length) * 100);
    }
    function foodPct(){
      const all = state.foodList.length + state.teaList.length;
      if (!all) return 0;
      const had = state.foodList.filter(f => state.foods[f]).length + state.teaList.filter(t => state.teas[t]).length;
      return Math.round((had / all) * 100);
    }
    function skillPct(){
      const s = state.skills[state.activeSkill];
      if (!s || !s.ladder.length) return 0;
      return Math.round((s.currentRung / (s.ladder.length - 1)) * 100);
    }
    function todayTotal(){
      const tasks = [...state.tasks.jobs, ...state.tasks.move, ...state.tasks.sauna,
                     ...state.tasks[state.activeLang === 'es' ? 'lang_es' : 'lang_pt']];
      return tasks.filter(t => state.completed[t.id]).reduce((s,t) => s + t.xp, 0);
    }

    function renderTasks(group, listId){
      const key = group === 'lang' ? (state.activeLang === 'es' ? 'lang_es' : 'lang_pt') : group;
      const list = state.tasks[key];
      const el = document.getElementById(listId);
      if (!el) return;
      const editing = editMode.group === group;
      el.innerHTML = list.map(t => {
        if (editing) {
          return `<div class="ld-task editing" data-id="${t.id}">
            <div style="flex:1">
              <input class="ld-edit-input" data-field="t" data-id="${t.id}" value="${escapeHtml(t.t)}" />
              <input class="ld-edit-input sub" data-field="s" data-id="${t.id}" value="${escapeHtml(t.s)}" />
            </div>
            <input class="ld-edit-input" data-field="xp" data-id="${t.id}" type="number" value="${t.xp}" style="width:50px" />
            <button class="ld-icon-btn danger" data-delete="${t.id}">×</button>
          </div>`;
        }
        return `<div class="ld-task ${state.completed[t.id] ? 'done' : ''}" data-id="${t.id}">
          <div class="ld-checkbox">${state.completed[t.id] ? '✓' : ''}</div>
          <div class="ld-task-body">
            <div class="ld-task-title">${escapeHtml(t.t)}</div>
            <div class="ld-task-sub">${escapeHtml(t.s)}</div>
          </div>
          <div class="ld-task-xp">+${t.xp}</div>
        </div>`;
      }).join('');
      if (editing) {
        el.insertAdjacentHTML('beforeend', `<div class="ld-add-row">
          <input id="add-t-${group}" placeholder="New task" />
          <input id="add-s-${group}" placeholder="Subtitle" />
          <input id="add-xp-${group}" type="number" placeholder="XP" value="10" />
          <button data-add="${group}">+ Add</button>
        </div>`);
        el.querySelectorAll('.ld-edit-input').forEach(inp => {
          inp.addEventListener('change', () => {
            const id = inp.dataset.id, f = inp.dataset.field;
            const item = list.find(x => x.id === id);
            if (item) { item[f] = f === 'xp' ? (Number(inp.value)||0) : inp.value; save(); }
          });
        });
        el.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', () => {
            state.tasks[key] = state.tasks[key].filter(t => t.id !== btn.dataset.delete);
            delete state.completed[btn.dataset.delete];
            save(); renderAll();
          });
        });
        el.querySelector('[data-add]').addEventListener('click', () => {
          const t = document.getElementById('add-t-' + group).value.trim();
          const s = document.getElementById('add-s-' + group).value.trim();
          const xp = Number(document.getElementById('add-xp-' + group).value) || 10;
          if (!t) return;
          state.tasks[key].push({ id: uid(group), t, s, xp });
          save(); renderAll();
        });
      } else {
        el.querySelectorAll('.ld-task').forEach(node => {
          node.addEventListener('click', () => {
            const id = node.dataset.id;
            state.completed[id] = !state.completed[id];
            save(); renderAll();
          });
        });
      }
    }

    function renderFood(){
      const fg = document.getElementById('food-grid');
      if (!fg) return;
      fg.innerHTML = state.foodList.map(f =>
        `<div class="ld-food ${state.foods[f] ? 'had' : ''}" data-food="${escapeHtml(f)}">${escapeHtml(f)}${editMode.foods ? ' ×' : ''}</div>`
      ).join('');
      const tg = document.getElementById('tea-grid');
      tg.innerHTML = state.teaList.map(t =>
        `<div class="ld-food ${state.teas[t] ? 'had' : ''}" data-tea="${escapeHtml(t)}">${escapeHtml(t)}${editMode.foods ? ' ×' : ''}</div>`
      ).join('');
      document.querySelectorAll('#add-food-row, #add-tea-row').forEach(el => el.remove());
      if (editMode.foods) {
        fg.insertAdjacentHTML('afterend', `<div class="ld-add-row" id="add-food-row"><input id="add-food" placeholder="Add food" /><button data-add-food="1">+ Add</button></div>`);
        tg.insertAdjacentHTML('afterend', `<div class="ld-add-row" id="add-tea-row"><input id="add-tea" placeholder="Add tea" /><button data-add-tea="1">+ Add</button></div>`);
        document.querySelector('[data-add-food]').addEventListener('click', () => {
          const v = document.getElementById('add-food').value.trim();
          if (v && !state.foodList.includes(v)) { state.foodList.push(v); save(); renderAll(); }
        });
        document.querySelector('[data-add-tea]').addEventListener('click', () => {
          const v = document.getElementById('add-tea').value.trim();
          if (v && !state.teaList.includes(v)) { state.teaList.push(v); save(); renderAll(); }
        });
      }
      fg.querySelectorAll('[data-food]').forEach(n => n.addEventListener('click', () => {
        if (editMode.foods) {
          state.foodList = state.foodList.filter(f => f !== n.dataset.food);
          delete state.foods[n.dataset.food];
        } else {
          state.foods[n.dataset.food] = !state.foods[n.dataset.food];
        }
        save(); renderAll();
      }));
      tg.querySelectorAll('[data-tea]').forEach(n => n.addEventListener('click', () => {
        if (editMode.foods) {
          state.teaList = state.teaList.filter(t => t !== n.dataset.tea);
          delete state.teas[n.dataset.tea];
        } else {
          state.teas[n.dataset.tea] = !state.teas[n.dataset.tea];
        }
        save(); renderAll();
      }));
      const gPct = Math.min(100, Math.round((state.grocery / 100) * 100));
      const bar = document.getElementById('grocery-bar');
      if (bar) {
        bar.style.width = gPct + '%';
        bar.style.background = state.grocery > 100 ? '#f87171' : (state.grocery > 80 ? '#fbbf24' : '#4ade80');
      }
      const stat = document.getElementById('grocery-status');
      if (stat) stat.textContent = state.grocery === 0 ? 'Set spend to track' :
                     state.grocery > 100 ? `$${Math.round(state.grocery - 100)} over target` :
                     `$${Math.round(100 - state.grocery)} remaining this week`;
    }

    function renderSkill(){
      document.querySelectorAll('.ld-skill-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.skill === state.activeSkill);
      });
      const skill = state.skills[state.activeSkill];
      const ladderEl = document.getElementById('skill-ladder');
      if (!ladderEl) return;
      ladderEl.innerHTML = skill.ladder.map((rung, i) => {
        const cls = i < skill.currentRung ? 'completed' : (i === skill.currentRung ? 'current' : '');
        if (editMode.skills) {
          return `<div class="ld-rung" style="cursor:default">
            <span class="ld-rung-num">${i+1}</span>
            <input class="ld-edit-input" data-rung-field="name" data-rung-i="${i}" value="${escapeHtml(rung.name)}" style="flex:1" />
            <input class="ld-edit-input" data-rung-field="target" data-rung-i="${i}" value="${escapeHtml(rung.target)}" style="width:120px" />
            <button class="ld-icon-btn danger" data-rung-del="${i}">×</button>
          </div>`;
        }
        return `<div class="ld-rung ${cls}" data-rung="${i}">
          <span class="ld-rung-num">${i+1}</span>
          <span class="ld-rung-name">${escapeHtml(rung.name)}</span>
          <span class="ld-rung-target">${escapeHtml(rung.target)}</span>
        </div>`;
      }).join('');
      if (editMode.skills) {
        ladderEl.insertAdjacentHTML('beforeend', `<div class="ld-add-row">
          <input id="add-rung-name" placeholder="Rung name" />
          <input id="add-rung-target" placeholder="Target" />
          <button id="add-rung-btn">+ Add</button>
        </div>`);
        ladderEl.querySelectorAll('[data-rung-field]').forEach(inp => {
          inp.addEventListener('change', () => {
            skill.ladder[Number(inp.dataset.rungI)][inp.dataset.rungField] = inp.value;
            save();
          });
        });
        ladderEl.querySelectorAll('[data-rung-del]').forEach(btn => {
          btn.addEventListener('click', () => {
            skill.ladder.splice(Number(btn.dataset.rungDel), 1);
            if (skill.currentRung >= skill.ladder.length) skill.currentRung = Math.max(0, skill.ladder.length - 1);
            save(); renderSkill();
          });
        });
        document.getElementById('add-rung-btn').addEventListener('click', () => {
          const n = document.getElementById('add-rung-name').value.trim();
          const t = document.getElementById('add-rung-target').value.trim();
          if (!n) return;
          skill.ladder.push({ id: uid('rung'), name: n, target: t || '—' });
          save(); renderSkill();
        });
      } else {
        ladderEl.querySelectorAll('[data-rung]').forEach(node => {
          node.addEventListener('click', () => {
            skill.currentRung = Number(node.dataset.rung);
            save(); renderAll();
          });
        });
      }
      const logEl = document.getElementById('skill-log');
      const sessions = state.skillLog.filter(s => s.skill === state.activeSkill).slice().reverse();
      if (!sessions.length) {
        logEl.innerHTML = `<div class="ld-log-empty">No sessions logged yet for ${escapeHtml(skill.name)}.</div>`;
      } else {
        logEl.innerHTML = sessions.map(s => `<div class="ld-log-row">
          <div class="ld-log-date">${s.date}<br/>D${s.day}</div>
          <div>
            <div style="color:#e5e5e5; font-size:12px">${escapeHtml(s.sets)}</div>
            ${s.notes ? `<div class="ld-log-notes" style="margin-top:4px">${escapeHtml(s.notes)}</div>` : ''}
          </div>
          <div style="text-align:center"><span style="color:#fbbf24">${s.quality}/10</span></div>
          <button class="ld-icon-btn danger" data-del-session="${s.id}">×</button>
        </div>`).join('');
        logEl.querySelectorAll('[data-del-session]').forEach(b => {
          b.addEventListener('click', () => {
            state.skillLog = state.skillLog.filter(x => x.id !== b.dataset.delSession);
            save(); renderSkill();
          });
        });
      }
    }

    function renderMood(){
      document.querySelectorAll('.ld-mood-btn').forEach(b => {
        b.classList.toggle('active', Number(b.dataset.mood) === state.mood);
      });
    }

    function renderWeek(){
      const letters = ['M','T','W','T','F','S','S'];
      const today = (state.day - 1) % 7;
      const wg = document.getElementById('week-grid');
      if (!wg) return;
      wg.innerHTML = letters.map((l, i) => {
        const isToday = i === today;
        const dayNum = state.day - today + i;
        const hist = state.history[dayNum];
        const dotColor = hist ? '#4ade80' : (isToday ? '#fbbf24' : '#3a3a3a');
        return `<div class="ld-day ${isToday ? 'today' : ''}">
          <div class="ld-day-letter">${l}</div><div class="ld-day-dot" style="color:${dotColor}">●</div>
        </div>`;
      }).join('');
      const cells = [];
      for (let i = 0; i < 91; i++){
        const d = state.day - 90 + i;
        const v = state.history[d];
        let cls = '';
        if (d === state.day) cls = 'l2';
        else if (v >= 80) cls = 'l4';
        else if (v >= 60) cls = 'l3';
        else if (v >= 30) cls = 'l2';
        else if (v > 0) cls = 'l1';
        cells.push(`<div class="ld-heat-cell ${cls}"></div>`);
      }
      document.getElementById('heatmap').innerHTML = cells.join('');
      const labels = [];
      for (let w = 0; w < 13; w++){
        const date = new Date();
        date.setDate(date.getDate() + (w * 7 - 90));
        labels.push(`<div class="ld-heat-label">${date.getMonth()+1}/${date.getDate()}</div>`);
      }
      document.getElementById('heat-labels').innerHTML = labels.join('');
    }

    function renderAll(){
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('ld-curday', state.day);
      set('ld-day', state.day);
      const today = todayTotal();
      set('ld-today', today);
      set('ld-streak', state.streak);
      set('ld-xp', state.totalXP + today);
      set('ld-totxp', state.totalXP + today);
      ['jobs','move','sauna'].forEach(g => {
        const p = pctDone(g);
        const bar = document.getElementById('bar-' + g);
        if (bar) bar.style.width = p + '%';
        set('pct-' + g, p + '%');
      });
      const fp = foodPct();
      const fbar = document.getElementById('bar-food'); if (fbar) fbar.style.width = fp + '%';
      set('pct-food', fp + '%');
      const lp = pctDone('lang');
      const lbar = document.getElementById('bar-lang'); if (lbar) lbar.style.width = lp + '%';
      set('pct-lang', lp + '%');
      const sp = skillPct();
      const sbar = document.getElementById('bar-skill'); if (sbar) sbar.style.width = sp + '%';
      set('pct-skill', sp + '%');
      const totalPct = Math.round((pctDone('jobs') + pctDone('move') + fp + pctDone('sauna') + lp + sp) / 6);
      let msg = `Day ${state.day}. Start with one task. That's all.`;
      if (totalPct > 0 && totalPct < 40) msg = `Day ${state.day}. Momentum building. Keep going.`;
      else if (totalPct >= 40 && totalPct < 80) msg = `Day ${state.day}. Solid progress. Don't coast.`;
      else if (totalPct >= 80) msg = `Day ${state.day}. Locked in. This is the standard.`;
      set('ld-msg', msg);

      document.querySelectorAll('.ld-lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === state.activeLang));

      renderTasks('jobs', 'tasks-jobs');
      renderTasks('move', 'tasks-move');
      renderTasks('sauna', 'tasks-sauna');
      renderTasks('lang', 'tasks-lang');
      renderFood();
      renderSkill();
      renderMood();
      renderWeek();
      setSync(syncStatus);

      const notesEl = document.getElementById('notes-text');
      if (notesEl) { notesEl.value = state.notes; set('notes-count', state.notes.length); }
      const vocabEl = document.getElementById('lang-vocab');
      if (vocabEl) vocabEl.value = state.langVocab;
      const grocEl = document.getElementById('grocery-spend');
      if (grocEl) grocEl.value = state.grocery;
      const smEl = document.getElementById('sauna-min');
      if (smEl) smEl.value = state.saunaMin;
      const srEl = document.getElementById('sauna-rounds');
      if (srEl) srEl.value = state.saunaRounds;
    }

    function attachHandlers(){
      document.getElementById('signout-btn').addEventListener('click', signOut);
      document.getElementById('ld-daypill').addEventListener('click', () => {
        const v = prompt('Set current day (1-90):', state.day);
        if (v === null) return;
        state.day = Math.max(1, Math.min(90, Number(v) || 1));
        save(); renderAll();
      });
      document.querySelectorAll('.ld-tab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.ld-tab').forEach(x => x.classList.remove('active'));
          document.querySelectorAll('.ld-section').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          document.querySelector(`[data-section="${t.dataset.tab}"]`).classList.add('active');
        });
      });
      document.querySelectorAll('.ld-lang-btn').forEach(b => b.addEventListener('click', () => {
        state.activeLang = b.dataset.lang; save(); renderAll();
      }));
      document.querySelectorAll('.ld-skill-btn').forEach(b => b.addEventListener('click', () => {
        state.activeSkill = b.dataset.skill; save(); renderAll();
      }));
      document.querySelectorAll('.ld-mood-btn').forEach(b => b.addEventListener('click', () => {
        state.mood = Number(b.dataset.mood); save(); renderMood();
      }));
      document.querySelectorAll('[data-edit-group]').forEach(b => b.addEventListener('click', () => {
        const g = b.dataset.editGroup;
        editMode.group = editMode.group === g ? null : g;
        b.textContent = editMode.group === g ? 'DONE' : 'EDIT';
        renderTasks(g, 'tasks-' + g);
      }));
      document.querySelector('[data-edit-foods]').addEventListener('click', (e) => {
        editMode.foods = !editMode.foods;
        e.target.textContent = editMode.foods ? 'DONE' : 'EDIT';
        renderFood();
      });
      document.querySelector('[data-edit-skill]').addEventListener('click', (e) => {
        editMode.skills = !editMode.skills;
        e.target.textContent = editMode.skills ? 'DONE' : 'EDIT';
        renderSkill();
      });
      document.getElementById('skill-log-btn').addEventListener('click', () => {
        const sets = document.getElementById('skill-sets').value.trim();
        const quality = Number(document.getElementById('skill-quality').value) || 7;
        const notes = document.getElementById('skill-notes').value.trim();
        if (!sets) return;
        const today = new Date();
        state.skillLog.push({
          id: uid('sess'), skill: state.activeSkill, sets, quality, notes,
          day: state.day, date: `${today.getMonth()+1}/${today.getDate()}`,
        });
        document.getElementById('skill-sets').value = '';
        document.getElementById('skill-notes').value = '';
        save(); renderSkill();
      });
      document.getElementById('notes-text').addEventListener('input', (e) => {
        state.notes = e.target.value;
        document.getElementById('notes-count').textContent = e.target.value.length;
        save();
      });
      document.getElementById('lang-vocab').addEventListener('input', (e) => { state.langVocab = e.target.value; save(); });
      document.getElementById('grocery-spend').addEventListener('input', (e) => { state.grocery = Number(e.target.value)||0; save(); renderFood(); });
      document.getElementById('sauna-min').addEventListener('input', (e) => { state.saunaMin = Number(e.target.value)||0; save(); });
      document.getElementById('sauna-rounds').addEventListener('input', (e) => { state.saunaRounds = Number(e.target.value)||0; save(); });
      document.getElementById('btn-export').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date();
        a.href = url; a.download = `lockdown-day${state.day}-${today.getMonth()+1}-${today.getDate()}.json`; a.click();
        URL.revokeObjectURL(url);
      });
      document.getElementById('import-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (typeof parsed !== 'object' || !parsed.tasks) throw new Error('Not a valid Lockdown export');
            if (!confirm('Replace ALL current data (cloud + local)?')) return;
            state = Object.assign(freshState(), parsed);
            save();
            document.getElementById('import-status').textContent = '✓ Imported. Syncing to cloud…';
            document.getElementById('import-status').style.color = '#4ade80';
            renderAll();
          } catch(err) {
            document.getElementById('import-status').textContent = '✗ ' + err.message;
            document.getElementById('import-status').style.color = '#f87171';
          }
        };
        reader.readAsText(file);
      });
      document.getElementById('btn-reset').addEventListener('click', async () => {
        if (!confirm('Reset all progress (including cloud)? Export first if you want a backup.')) return;
        state = freshState();
        await saveToCloud();
        renderAll();
      });
    }

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        user = session.user;
        await loadFromCloud();
      } else {
        renderAuth('signup');
      }
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session?.user && (!user || user.id !== session.user.id)) {
          user = session.user;
          await loadFromCloud();
        } else if (event === 'SIGNED_OUT') {
          user = null;
          state = freshState();
          renderAuth('signin');
        }
      });
    })();
  </script>
</body>
</html>
